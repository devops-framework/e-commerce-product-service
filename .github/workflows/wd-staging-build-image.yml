name: Manual Build Back for STG
run-name: 'Build e-commerce-product-service and push image for Staging'

on:
  workflow_dispatch:

concurrency:
  group: 'manual-build-staging'
  cancel-in-progress: true

jobs:
  build:
    name: e-commerce-storebacke-product-service
    uses: devops-framework/iac-vagrant-k8s-cluster-local/.github/workflows/wc-reusable-manual-build-image.yml@dev
    permissions:
      contents: write
    with:
      app_name: 'e-commerce-product-service'
      gha_environment: staging
      dockerfile_path: "./devops/ci/docker/staging/Dockerfile"
    secrets: inherit
